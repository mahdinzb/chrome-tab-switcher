<!DOCTYPE html>
<html>
<head>
  <title>Tab Switcher Settings</title>
  <style>
    body { width: 200px; padding: 10px; font-family: sans-serif; }
    input[type="number"] { width: 80px; margin-right: 5px; }
    button { margin-top: 10px; padding: 8px 15px; cursor: pointer; }
    .status { margin-top: 15px; font-size: 0.9em; color: grey; }
  </style>
</head>
<body>
  <h3>Tab Switcher</h3>
  <div>
    <label for="interval">Switch every (seconds):</label>
    <input type="number" id="interval" min="1" value="15">
  </div>
  <button id="startBtn">Start</button>
  <button id="stopBtn">Stop</button>
  <div id="status" class="status">Status: Idle</div>

  <script src="popup.js"></script>
</body>
</html>
