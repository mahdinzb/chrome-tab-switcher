<!DOCTYPE html>
<html>
<head>
  <title>Tab Switcher Settings</title>
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      box-sizing: border-box;
    }
    h3 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 15px;
      border-bottom: 2px solid #3498db;
      padding-bottom: 8px;
      font-size: 1.2em;
    }
    .setting-group {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    label {
      font-weight: 600;
      color: #555;
      flex-shrink: 0;
      margin-right: 8px;
      font-size: 0.9em;
    }
    input[type="number"] {
      width: 60px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 0.9em;
      text-align: center;
      outline: none;
      transition: border-color 0.3s ease;
    }
    input[type="number"]:focus {
      border-color: #3498db;
    }
    .button-container {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: 600;
      transition: background-color 0.3s ease, transform 0.2s ease;
      outline: none;
    }
    #startBtn {
      background-color: #2ecc71;
      color: white;
    }
    #startBtn:hover {
      background-color: #27ae60;
      transform: translateY(-2px);
    }
    #stopBtn {
      background-color: #e74c3c;
      color: white;
    }
    #stopBtn:hover {
      background-color: #c0392b;
      transform: translateY(-2px);
    }
    .status {
      margin-top: 15px;
      padding: 8px;
      background-color: #ecf0f1;
      border-radius: 5px;
      text-align: center;
      font-size: 0.9em;
      border: 1px dashed #bdc3c7;
    }
    .status.running {
      color: #27ae60;
      border-color: #2ecc71;
    }
    .status.idle {
      color: #7f8c8d;
    }
  </style>
</head>
<body>
  <h3>Tab Switcher</h3>
  <div class="setting-group">
    <label for="interval">Interval (sec):</label>
    <input type="number" id="interval" min="1" value="15">
  </div>

  <div class="button-container">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div id="status" class="status idle">Status: Idle</div>

  <script src="popup.js"></script>
</body>
</html>
